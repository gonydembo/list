.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center}

        <button onClick={()=>onQty(item.id,1)} style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,background:"#f3f4f6",color:"#6b7280",border:"none",cursor:"pointer"}}>+</button>
      </div>}

  </div>);
}

/* ═══════ APP ═══════ */
function App(){
  // Data
  const load=k=>{try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}};
  const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

  const[step,setStep]=useState(()=>load("sl_user")?"lists":"auth");
  const[lang,setLang]=useState(()=>localStorage.getItem("sl_lang")||"he");
  const[authMode,setAuthMode]=useState("login");
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[showPw,setShowPw]=useState(false);
  const[uName,setUName]=useState(()=>load("sl_user")||"");

  // Multi-list state
  const[allLists,setAllLists]=useState(()=>load("sl_lists")||[]);
  const[activeListId,setActiveListId]=useState(null);
  const[newListName,setNewListName]=useState("");
  const[renamingId,setRenamingId]=useState(null);
  const[renameVal,setRenameVal]=useState("");

  // Active list items
  const[items,setItems]=useState([]);
  const[query,setQuery]=useState("");
  const[searchOpen,setSearchOpen]=useState(false);
  const[editId,setEditId]=useState(null);
  const[nuModal,setNuModal]=useState(null);
  const[customOpen,setCustomOpen]=useState(false);
  const[customName,setCustomName]=useState("");
  const[customBrand,setCustomBrand]=useState("");
  const[customPrice,setCustomPrice]=useState("");
  const[customCat,setCustomCat]=useState("pa");
  const[customImg,setCustomImg]=useState(null);
  const[toast,setToast]=useState(null);
  const[installPrompt,setInstallPrompt]=useState(null);
  const sRef=useRef(null);

  const r=lang==="he";const dir=r?"rtl":"ltr";const tx=(a,b)=>r?b:a;const pN=p=>r?p.heb:p.name;const bN=b=>r?b.he:b.en;

  // Persist
  useEffect(()=>{save("sl_lists",allLists)},[allLists]);
  useEffect(()=>{localStorage.setItem("sl_lang",lang);document.documentElement.dir=r?"rtl":"ltr";document.documentElement.lang=r?"he":"en"},[lang,r]);

  // When active list changes, load its items
  useEffect(()=>{if(activeListId){const d=load("sl_items_"+activeListId);setItems(d||[])}else{setItems([])}},[activeListId]);
  // Save items when they change
  useEffect(()=>{if(activeListId)save("sl_items_"+activeListId,items)},[items,activeListId]);

  // PWA install
  useEffect(()=>{const h=e=>{e.preventDefault();setInstallPrompt(e)};window.addEventListener("beforeinstallprompt",h);return()=>window.removeEventListener("beforeinstallprompt",h)},[]);

  // Outside click for search
  useEffect(()=>{const h=e=>{if(sRef.current&&!sRef.current.contains(e.target))setSearchOpen(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);

  const flash=useCallback((m,bg)=>{setToast({m,bg:bg||"#1a1a2e"});setTimeout(()=>setToast(null),2500)},[]);

  // Auth
  const doAuth=()=>{if(!email.includes("@")||pw.length<3){flash(tx("Fill all fields","מלא/י הכל"),"#e8513d");return}const n=authMode==="signup"&&uName?uName:email.split("@")[0];setUName(n);save("sl_user",n);setStep("lists")};
  const logout=()=>{localStorage.removeItem("sl_user");setStep("auth");setUName("")};

  // ── Lists management
  const createList=()=>{if(!newListName.trim())return;const id=String(Date.now());const nl={id,name:newListName.trim(),created:new Date().toISOString()};setAllLists(p=>[nl,...p]);setNewListName("");flash(newListName.trim()+" ✓","#22c55e")};
  const deleteList=(id)=>{setAllLists(p=>p.filter(l=>l.id!==id));localStorage.removeItem("sl_items_"+id)};
  const renameList=(id)=>{if(!renameVal.trim())return;setAllLists(p=>p.map(l=>l.id===id?{...l,name:renameVal.trim()}:l));setRenamingId(null)};
  const openList=(id)=>{setActiveListId(id);setStep("list")};
  const backToLists=()=>{setStep("lists");setActiveListId(null);setEditId(null);setSearchOpen(false);setQuery("")};

  // ── List item ops
  const sRes=query.trim().length>=1?DB_P.filter(p=>{const lq=query.toLowerCase();return p.name.toLowerCase().includes(lq)||p.heb.includes(query)||p.brands.some(b=>b.en.toLowerCase().includes(lq)||b.he.includes(query))}).slice(0,10):[];

  const addItem=(product,brandObj)=>{const k=product.id+"_"+brandObj.en;if(items.find(i=>i.k===k)){flash(tx("Already in list","כבר ברשימה"),"#f59e0b");return}setItems(p=>[...p,{id:String(Date.now())+"_"+k,k,nameEn:product.name,nameHe:product.heb,brandEn:brandObj.en,brandHe:brandObj.he,price:brandObj.price,qty:1,unit:product.units[0],done:false,cat:product.cat,img:null,units:[...product.units],nu:product.nu||null}]);flash(pN(product)+" ("+bN(brandObj)+") ✓","#22c55e");setSearchOpen(false);setQuery("")};

  const addCustom=()=>{if(!customName.trim()){flash(tx("Enter name","הכנס שם"),"#e8513d");return}setItems(p=>[...p,{id:String(Date.now())+"_c",k:String(Date.now())+"_c",nameEn:customName,nameHe:customName,brandEn:customBrand||"—",brandHe:customBrand||"—",price:parseFloat(customPrice)||0,qty:1,unit:"unit",done:false,cat:customCat,img:customImg,units:AU,nu:null}]);flash(customName+" ✓","#22c55e");setCustomOpen(false);setCustomName("");setCustomBrand("");setCustomPrice("");setCustomCat("pa");setCustomImg(null)};

  const handleImg=(itemId,e)=>{const file=e.target.files&&e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{if(itemId==="custom")setCustomImg(ev.target.result);else setItems(p=>p.map(i=>i.id===itemId?{...i,img:ev.target.result}:i))};reader.readAsDataURL(file)};

  const updItem=(id,f,v)=>setItems(p=>p.map(i=>i.id===id?{...i,[f]:v}:i));
  const toggleDone=id=>setItems(p=>p.map(i=>i.id===id?{...i,done:!i.done}:i));
  const chgQty=(id,d)=>setItems(p=>p.map(i=>{if(i.id!==id)return i;const nq=Math.round((i.qty+d)*10)/10;return nq>=0.1?{...i,qty:nq}:i}));

  const clearDone=()=>setItems(p=>p.filter(i=>!i.done));
  const toggleEdit=id=>setEditId(editId===id?null:id);

  const grp=its=>{const g={};its.forEach(i=>{(g[i.cat]=g[i.cat]||[]).push(i)});return Object.keys(g).sort().map(k=>({ck:k,items:g[k]}))};
  const unc=items.filter(i=>!i.done),chk=items.filter(i=>i.done);const uncG=grp(unc),chkG=grp(chk);const total=unc.reduce((s,i)=>s+i.price*i.qty,0);

  // Share — uses Web Share API with clipboard fallback
  const doShare=async()=>{
    const listName=allLists.find(l=>l.id===activeListId)?.name||"Shopping List";
    const lines=unc.map(i=>"☐ "+(r?i.nameHe:i.nameEn)+" ("+(r?i.brandHe:i.brandEn)+") ×"+i.qty+" ₪"+(i.price*i.qty).toFixed(2));
    const txt="🛒 "+listName+"\n"+lines.join("\n")+"\n\n"+tx("Total","סה״כ")+": ₪"+total.toFixed(2);
    // Try native share first (works on mobile)
    if(navigator.share){try{await navigator.share({title:listName,text:txt});flash(tx("Shared!","שותף!"),"#22c55e");return}catch(e){/* user cancelled or not supported */}}
    // Fallback to clipboard
    try{await navigator.clipboard.writeText(txt);flash(tx("Copied to clipboard!","הועתק ללוח!"),"#22c55e")}catch(e){
      // Final fallback for older browsers
      const ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);flash(tx("Copied!","הועתק!"),"#22c55e")
    }
  };

  // Styles
  const INP={width:"100%",padding:"12px 16px",borderRadius:12,border:"2px solid #e5e7eb",outline:"none",fontSize:14,fontWeight:600,fontFamily:"'Nunito'",background:"#fff",direction:dir,textAlign:r?"right":"left",boxSizing:"border-box"};

  const CB={width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"};

  /* ═══ AUTH ═══ */
  if(step==="auth")return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",direction:dir}}>
      <div style={{background:"#1a1a2e",padding:"50px 24px 28px",textAlign:"center"}}>

        <button onClick={()=>setLang(lang==="en"?"he":"en")} style={{...CB,margin:"14px auto 0",background:"rgba(255,255,255,.1)"}}>{lang==="en"?"עב":"EN"}</button>

      <div style={{flex:1,padding:"20px"}}>
        <div style={{display:"flex",background:"#f3f4f6",borderRadius:12,padding:3,marginBottom:18}}>{["login","signup"].map(m=><button key={m} onClick={()=>setAuthMode(m)} style={{flex:1,padding:"10px 0",borderRadius:10,fontWeight:700,fontSize:14,border:"none",cursor:"pointer",background:authMode===m?"#fff":"transparent",color:authMode===m?"#1a1a2e":"#9ca3af"}}>{m==="login"?tx("Log In","התחברות"):tx("Sign Up","הרשמה")}</button>)}</div>
        {authMode==="signup"&&<div style={{marginBottom:10}}><label style={{fontSize:12,fontWeight:700,color:"#6b7280",display:"block",marginBottom:4}}>{tx("Full Name","שם מלא")}</label><input value={uName} onChange={e=>setUName(e.target.value)} style={INP}/></div>}

    </div>
  );

  /* ═══ MY LISTS ═══ */
  if(step==="lists")return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",direction:dir}} className="fi">
      <div style={{background:"#1a1a2e",padding:"max(env(safe-area-inset-top),12px) 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>🛒</span><h1 style={{fontSize:18,fontWeight:800,color:"#fff",margin:0}}>{tx("My Lists","הרשימות שלי")}</h1></div>
        <div style={{display:"flex",gap:5}}><button onClick={()=>setLang(lang==="en"?"he":"en")} style={CB}>{lang==="en"?"עב":"EN"}</button><button onClick={logout} style={{...CB,fontSize:10}}>🚪</button></div>
      </div>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:16}}>
        {/* Create new list */}
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <input value={newListName} onChange={e=>setNewListName(e.target.value)} placeholder={tx("New list name...","שם רשימה חדשה...")} style={{...INP,flex:1}} onKeyDown={e=>e.key==="Enter"&&createList()}/>
          <button onClick={createList} style={{padding:"12px 20px",borderRadius:12,background:"#e8513d",color:"#fff",fontWeight:800,border:"none",cursor:"pointer",fontSize:14,fontFamily:"'Nunito'",whiteSpace:"nowrap"}}>+ {tx("Create","צור")}</button>
        </div>
        {allLists.length===0?<div style={{textAlign:"center",padding:"40px 0"}}><div style={{fontSize:52}}>📝</div><p style={{color:"#9ca3af",fontWeight:700,marginTop:8}}>{tx("No lists yet","אין עדיין רשימות")}</p><p style={{color:"#d1d5db",fontSize:13,marginTop:4}}>{tx("Create your first list above","צרו את הרשימה הראשונה למעלה")}</p></div>:
        allLists.map(lst=>{
          const listItems=load("sl_items_"+lst.id)||[];
          const uncCount=listItems.filter(i=>!i.done).length;

              <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>

              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px 4px"}}><span style={{fontSize:18}}>{cat.emoji}</span><div style={{flex:1}}><div style={{fontWeight:800,fontSize:14,color:"#1a1a2e"}}>{pN(product)}</div>{product.nu&&product.nu.cal>0&&<div style={{fontSize:10,color:"#9ca3af"}}>{product.nu.cal} kcal</div>}</div><span style={{padding:"2px 8px",borderRadius:99,fontSize:9,fontWeight:700,textTransform:"uppercase",background:cat.color+"18",color:cat.color}}>{r?cat.he:cat.en}</span></div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,padding:"6px 14px 10px 42px"}}>{product.brands.map((bo,bi)=><button key={bi} onClick={()=>addItem(product,bo)} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:10,border:"1.5px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,color:"#4b5563"}}><span>{bN(bo)}</span><span style={{color:cat.color,fontWeight:800}}>₪{bo.price.toFixed(1)}</span><span style={{fontSize:14,color:"#d1d5db"}}>+</span></button>)}</div>
            </div>})}
            <button onClick={()=>{setCustomOpen(true);setCustomName(query);setSearchOpen(false);setQuery("")}} style={{display:"block",padding:"10px 14px",fontSize:12,fontWeight:700,color:"#6366f1",background:"none",border:"none",borderTop:"1px solid #f3f4f6",width:"100%",textAlign:r?"right":"left",cursor:"pointer"}}>+ {tx("Add custom","הוסף ידני")}</button>
          </>}
        </div>}
      </div>

      <div style={{padding:"2px 16px 6px",display:"flex",gap:8}}>
        <button onClick={()=>setCustomOpen(true)} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:700,padding:"5px 10px",borderRadius:8,border:"none",background:"rgba(232,81,61,.08)",color:"#e8513d",cursor:"pointer"}}>+ {tx("Custom","מוצר חדש")}</button>
      </div>

      {/* Items */}
      {items.length===0?<div style={{textAlign:"center",padding:"50px 16px"}}><div style={{fontSize:52}}>🧺</div><p style={{color:"#9ca3af",fontWeight:700,fontSize:15,marginTop:8}}>{tx("Empty list","רשימה ריקה")}</p><p style={{color:"#d1d5db",fontSize:13,marginTop:4}}>{tx("Search to add products","חפשו כדי להוסיף מוצרים")}</p></div>:
      <div style={{padding:"0 16px 20px"}}>
        {uncG.map(g=>{const cat=catOf(g.ck);return<div key={g.ck}><div style={{marginTop:12,marginBottom:5,fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:".5px",color:cat.color,display:"flex",alignItems:"center",gap:6}}>{cat.emoji} {r?cat.he:cat.en}<span style={{background:cat.color+"18",color:cat.color,borderRadius:10,padding:"1px 7px",fontSize:10}}>{g.items.length}</span></div>
          {g.items.map(item=><ItemRow key={item.id} item={item} lang={lang} isRTL={r} editing={editId===item.id} onToggle={toggleDone} onQty={chgQty} onUpdate={updItem} onDelete={delItem} onEdit={toggleEdit} onImg={handleImg} onNutrition={setNuModal}/>)}</div>})}
        {chk.length>0&&<><div style={{display:"flex",alignItems:"center",gap:8,marginTop:20,marginBottom:6}}><div style={{flex:1,height:1,background:"#e5e7eb"}}/><span style={{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase"}}>{tx("Done","הושלמו")} ({chk.length})</span><div style={{flex:1,height:1,background:"#e5e7eb"}}/></div>
          <button onClick={clearDone} style={{fontSize:11,fontWeight:700,color:"#ef4444",background:"none",border:"none",cursor:"pointer",marginBottom:6}}>🗑 {tx("Clear","נקה")}</button>
          {chkG.map(g=>{const cat=catOf(g.ck);return<div key={g.ck}><div style={{marginTop:8,marginBottom:4,fontSize:11,fontWeight:800,textTransform:"uppercase",color:cat.color}}>{cat.emoji} {r?cat.he:cat.en}</div>
            {g.items.map(item=><ItemRow key={item.id} item={item} lang={lang} isRTL={r} editing={false} onToggle={toggleDone} onQty={chgQty} onUpdate={updItem} onDelete={delItem} onEdit={toggleEdit} onImg={handleImg} onNutrition={setNuModal}/>)}</div>})}</>}
      </div>}
    </div>

    {/* Summary */}
    {items.length>0&&<div style={{background:"#1a1a2e",padding:"10px 16px",paddingBottom:"max(10px,env(safe-area-inset-bottom))",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
      <span style={{fontWeight:800,fontSize:17,color:"#fff"}}>{unc.length}/{items.length} <span style={{fontSize:11,opacity:.6}}>{tx("left","נותרו")}</span></span>
      <span style={{fontWeight:800,fontSize:17,color:"#fff"}}>₪{total.toFixed(2)}</span>
    </div>}

    {/* Nutrition */}
    {nuModal&&nuModal.nu&&<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setNuModal(null)}}><div className="mc su">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><h3 style={{fontWeight:800,fontSize:15}}>{(r?nuModal.nameHe:nuModal.nameEn)} — {tx("Nutrition","תזונה")}</h3><button onClick={()=>setNuModal(null)} style={{background:"none",border:"none",color:"#9ca3af",fontSize:18,cursor:"pointer"}}>✕</button></div>
      {[[tx("Calories","קלוריות"),nuModal.nu.cal+" kcal"],[tx("Fat","שומן"),nuModal.nu.fat+"g"],[tx("Carbs","פחמימות"),nuModal.nu.carb+"g"],[tx("Protein","חלבון"),nuModal.nu.pro+"g"],[tx("Fiber","סיבים"),nuModal.nu.fib+"g"]].map(([l,v],i,a)=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<a.length-1?"1px solid #f3f4f6":"none",fontSize:14}}><span style={{fontWeight:700}}>{l}</span><span>{v}</span></div>)}
      <button onClick={()=>setNuModal(null)} style={{...DBT,marginTop:12}}>{tx("Close","סגור")}</button>
    </div></div>}

    {/* Custom */}
    {customOpen&&<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setCustomOpen(false)}}><div className="mc su">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><h3 style={{fontWeight:800,fontSize:17}}>{tx("Add Product","הוסף מוצר")}</h3><button onClick={()=>setCustomOpen(false)} style={{background:"none",border:"none",color:"#9ca3af",fontSize:18,cursor:"pointer"}}>✕</button></div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div><label style={{fontSize:11,fontWeight:700,color:"#6b7280"}}>{tx("Name","שם")} *</label><input value={customName} onChange={e=>setCustomName(e.target.value)} style={{...INP,padding:"10px 14px"}}/></div>
        <div><label style={{fontSize:11,fontWeight:700,color:"#6b7280"}}>{tx("Brand","מותג")}</label><input value={customBrand} onChange={e=>setCustomBrand(e.target.value)} placeholder={tx("Optional","אופציונלי")} style={{...INP,padding:"10px 14px"}}/></div>
        <div><label style={{fontSize:11,fontWeight:700,color:"#6b7280"}}>{tx("Price (₪)","מחיר (₪)")}</label><input type="number" value={customPrice} onChange={e=>setCustomPrice(e.target.value)} placeholder="0.00" style={{...INP,padding:"10px 14px",direction:"ltr",textAlign:"left"}}/></div>
        <div><label style={{fontSize:11,fontWeight:700,color:"#6b7280"}}>{tx("Category","קטגוריה")}</label><select value={customCat} onChange={e=>setCustomCat(e.target.value)} style={{...INP,padding:"10px 14px"}}>{CK.map(k=><option key={k} value={k}>{CATS[k].emoji} {r?CATS[k].he:CATS[k].en}</option>)}</select></div>
        <div><label style={{fontSize:11,fontWeight:700,color:"#6b7280"}}>{tx("Photo","תמונה")}</label><div style={{display:"flex",alignItems:"center",gap:10,marginTop:4}}>{customImg&&<img src={customImg} style={{width:48,height:48,borderRadius:8,objectFit:"cover"}} alt=""/>}<label style={{fontSize:12,fontWeight:700,color:"#6366f1",cursor:"pointer",padding:"8px 14px",borderRadius:10,border:"1.5px solid #6366f1"}}>📷 {tx("Upload","העלאה")}<input type="file" accept="image/*" onChange={e=>handleImg("custom",e)} style={{display:"none"}}/></label>{customImg&&<button onClick={()=>setCustomImg(null)} style={{fontSize:11,color:"#ef4444",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div></div>
      </div>
      <button onClick={addCustom} style={{...PB,marginTop:14}}>{tx("Add to List","הוסף לרשימה")}</button>
    </div></div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{})</script>
</body>
</html>
